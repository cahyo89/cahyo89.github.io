<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Fundamentals & Structured Thinking in Finance — Day 1 (60 Slides)</title>
  <style>
    :root{
      --bg:#0b1020; --card:#111a33; --text:#e9eefc; --muted:#b7c2e6;
      --accent:#6aa6ff; --accent2:#7cf0d6; --danger:#ff6a8a;
      --border:rgba(255,255,255,.12);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial; background:var(--bg); color:var(--text)}
    .app{min-height:100vh; display:flex; flex-direction:column}
    header{padding:14px 18px; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center; justify-content:space-between}
    header .title{font-weight:650; letter-spacing:.2px}
    header .meta{color:var(--muted); font-size:13px}

    .stage{flex:1; display:flex; justify-content:center; padding:18px}
    .slide{
      width:min(1100px, 100%);
      min-height:calc(100vh - 140px);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--border);
      border-radius:18px;
      padding:28px 30px;
      box-shadow:0 18px 45px rgba(0,0,0,.35);
      position:relative;
      overflow:hidden;
    }
    .slide:before{
      content:"";
      position:absolute; inset:-120px -120px auto auto;
      width:260px; height:260px;
      background:radial-gradient(circle at 30% 30%, rgba(106,166,255,.45), rgba(0,0,0,0));
      transform:rotate(18deg);
      pointer-events:none;
    }
    .kicker{color:var(--accent2); font-weight:700; font-size:13px; letter-spacing:.18em; text-transform:uppercase}
    h1{margin:10px 0 10px; font-size:40px; line-height:1.1}
    h2{margin:8px 0 10px; font-size:30px; line-height:1.15}
    h3{margin:10px 0 8px; font-size:20px}
    p{margin:10px 0; color:var(--text); font-size:18px; line-height:1.5}
    .muted{color:var(--muted)}
    .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:14px}
    .box{border:1px solid var(--border); border-radius:14px; padding:14px 14px; background:rgba(0,0,0,.18)}
    .box h4{margin:0 0 8px; font-size:15px; color:var(--accent)}
    .box p{margin:0; font-size:16px; color:var(--muted)}
    ul{margin:10px 0 0 0; padding-left:22px}
    li{margin:8px 0; font-size:18px; line-height:1.45; color:var(--text)}
    .tagrow{display:flex; flex-wrap:wrap; gap:8px; margin-top:10px}
    .tag{border:1px solid var(--border); color:var(--muted); padding:6px 10px; border-radius:999px; font-size:13px}

    footer{padding:12px 18px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:12px}
    .controls{display:flex; gap:10px; align-items:center}
    button{
      background:rgba(255,255,255,.08);
      border:1px solid var(--border);
      color:var(--text);
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
    }
    button:hover{background:rgba(255,255,255,.12)}
    button:disabled{opacity:.45; cursor:not-allowed}
    .pill{color:var(--muted); font-size:13px; border:1px solid var(--border); padding:7px 10px; border-radius:999px}
    .progress{height:8px; width:240px; background:rgba(255,255,255,.08); border:1px solid var(--border); border-radius:999px; overflow:hidden}
    .bar{height:100%; width:0%; background:linear-gradient(90deg, var(--accent), var(--accent2))}

    .kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; font-size:12px; color:var(--muted); border:1px solid var(--border); padding:3px 7px; border-radius:8px}

    @media (max-width: 820px){
      h1{font-size:32px}
      h2{font-size:24px}
      p, li{font-size:16px}
      .grid2{grid-template-columns:1fr}
      .progress{width:160px}
      .slide{padding:22px 18px; border-radius:16px}
    }
    @media print{
      body{background:#fff; color:#000}
      header, footer{display:none}
      .stage{padding:0}
      .slide{min-height:auto; box-shadow:none; border:none; border-radius:0}
    }
  </style>
</head>

          <div class="kicker">Interactive</div>
          <h2>Sesi tanya-jawab</h2>
          <p>Silakan ajukan pertanyaan tentang materi hari ini: AI basics, structured thinking, data quality, prompting, safety, atau implementasi di tim Anda.</p>
          <div class="box"><h4>Tidak ada pertanyaan bodoh</h4><p>Justru pertanyaan yang paling 'basic' sering kali paling penting untuk diperjelas.</p></div>
        `
      },
      {
        title: "Ringkasan satu halaman",
        html: `
          <div class="kicker">Summary</div>
          <h2>Day 1 dalam satu slide</h2>
          <ul>
            <li><b>AI = co-pilot</b>: bantu draft, struktur, ringkas—bukan pengambil keputusan.</li>
            <li><b>LLM bisa salah</b>: selalu verifikasi, minta asumsi, cross-check angka.</li>
            <li><b>Structured thinking</b>: MECE, issue tree, first principles, 5 Whys memberi arah analisis.</li>
            <li><b>Data quality</b>: garbage in = garbage out; audit sebelum pakai.</li>
            <li><b>Prompt = brief</b>: jelas, kontekstual, iteratif, dan transparan soal batasan.</li>
            <li><b>Safety first</b>: anonimisasi, tool approved, review sebelum kirim.</li>
          </ul>
        `
      },
      {
        title: "Kata penutup",
        html: `
          <div class="kicker">Closing</div>
          <h2>Sampai jumpa di Day 2!</h2>
          <p>AI adalah alat yang powerful—tetapi nilai terbesarnya muncul dari cara Anda berpikir, bertanya, dan memverifikasi. Terus eksplorasi, tetap kritis, dan bangun kebiasaan yang aman.</p>
          <p class="muted">Terima kasih atas partisipasi aktif hari ini. Selamat mengerjakan homework!</p>
        `
      },
      {
        title: "Kontak & feedback",
        html: `
          <div class="kicker">Feedback</div>
          <h2>Sampaikan masukan Anda</h2>
          <p>Masukan Anda membantu kami meningkatkan kualitas sesi berikutnya. Silakan isi form feedback yang dibagikan, atau hubungi fasilitator langsung.</p>
          <div class="tagrow">
            <span class="tag">Day 1 complete</span>
            <span class="tag">60 slides</span>
            <span class="tag">AI in Finance</span>
          </div>
        `
      }
    ];

    const elSlide = document.getElementById('slide');
    const elCounter = document.getElementById('slideCounter');
    const elBar = document.getElementById('bar');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const overviewBtn = document.getElementById('overviewBtn');

    let idx = 0;
    let inOverview = false;

    function clamp(n, min, max){ return Math.max(min, Math.min(max, n)); }

    function pct(){
      if (!slides.length) return 0;
      return ((idx + 1) / slides.length) * 100;
    }

    function setCounter(){
      elCounter.textContent = `Slide ${idx + 1} / ${slides.length || 60}`;
      elBar.style.width = `${pct()}%`;
      prevBtn.disabled = idx <= 0;
      nextBtn.disabled = slides.length ? idx >= slides.length - 1 : false;
    }

    function renderSlide(){
      if (!slides.length){
        elSlide.innerHTML = `
          <div class="kicker">DRAFT</div>
          <h1>Deck sedang disusun…</h1>
          <p class="muted">Saya akan mengisi konten 60 slide berdasarkan dua dokumen: (1) Agenda & workshop Day 1, dan (2) Fundamental AI for Finance — Day 1. Setelah terisi, Anda bisa navigasi dengan tombol atau keyboard.</p>
          <div class="grid2">
            <div class="box"><h4>Yang akan masuk</h4><p>Agenda, AI fundamentals, jenis AI & use cases finance, structured thinking (MECE, issue tree, first principles, 5 Whys), data literacy & quality, prompt engineering, latihan, safety rules, wrap-up.</p></div>
            <div class="box"><h4>Format</h4><p>60 slide ringkas tapi komprehensif, siap dipakai untuk kelas/workshop 1 hari.</p></div>
          </div>
          <div class="tagrow">
            <span class="tag">AI in Finance</span><span class="tag">LLM</span><span class="tag">Prompting</span><span class="tag">Data Quality</span><span class="tag">Structured Thinking</span>
          </div>
        `;
        setCounter();
        return;
      }

      if (inOverview){
        renderOverview();
        return;
      }

      elSlide.innerHTML = slides[idx].html;
      setCounter();
    }

    function renderOverview(){
      const items = slides.map((s, i) => {
        const safe = (s.title || `Slide ${i+1}`).replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<li><a href="#" data-i="${i}" style="color: var(--text); text-decoration:none;">${i+1}. ${safe}</a></li>`;
      }).join('');

      elSlide.innerHTML = `
        <div class="kicker">OVERVIEW</div>
        <h2>Daftar judul slide</h2>
        <p class="muted">Klik judul untuk lompat. Tekan <span class="kbd">Esc</span> atau <span class="kbd">O</span> untuk kembali.</p>
        <div class="box" style="max-height: calc(100vh - 260px); overflow:auto;">
          <ul style="margin-top:0">${items}</ul>
        </div>
      `;
      setCounter();

      elSlide.querySelectorAll('a[data-i]').forEach(a => {
        a.addEventListener('click', (e) => {
          e.preventDefault();
          idx = clamp(parseInt(a.getAttribute('data-i'), 10), 0, slides.length-1);
          inOverview = false;
          renderSlide();
        });
      });
    }

    function next(){
      if (!slides.length) return;
      if (idx < slides.length - 1) idx++;
      renderSlide();
    }

    function prev(){
      if (!slides.length) return;
      if (idx > 0) idx--;
      renderSlide();
    }

    function toggleOverview(){
      if (!slides.length) return;
      inOverview = !inOverview;
      renderSlide();
    }

    prevBtn.addEventListener('click', prev);
    nextBtn.addEventListener('click', next);
    overviewBtn.addEventListener('click', toggleOverview);

    window.addEventListener('keydown', (e) => {
      const key = e.key;
      if (key === 'ArrowRight' || key === ' ' || key === 'PageDown') { e.preventDefault(); next(); }
      if (key === 'ArrowLeft' || key === 'Backspace' || key === 'PageUp') { e.preventDefault(); prev(); }
      if (key === 'o' || key === 'O') { e.preventDefault(); toggleOverview(); }
      if (key === 'Escape') {
        if (inOverview){ inOverview = false; renderSlide(); }
      }
    });

    renderSlide();
  </script>
</body>
</html>
